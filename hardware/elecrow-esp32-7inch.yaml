# Elecrow 7” HMI ESP32 Display 800x480 RGB TFT LCD Touch Screen
#
# Hardware configuration file
---
esphome:
  min_version: 2026.4.0
  project:
    name: "Elecrow.ESP32-7inch"
    version: "1.0"
 platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
    #board_upload.maximum_ram_size: 524288

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
  sdkconfig_options:
     CONFIG_ESPTOOLPY_FLASHFREQ: "80MHz" # this is needed for flashing
     CONFIG_ESPTOOLPY_FLASHMODE_QIO: y
     CONFIG_FLASHMODE_QIO: y
     CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240: y
     CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ: '240'
     CONFIG_SPIRAM_RODATA: "y"

psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

output:
  - platform: ledc
    pin: GPIO2
    frequency: 1220
    id: gpio_backlight_pwm

light:
  # Define a monochromatic, dimmable light for the backlight
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: ALWAYS_ON

# -------------------------------------------
# Touchscreen
# -------------------------------------------
i2c:
  - id: bus_a
    sda: GPIO19
    scl: GPIO20
    scan: true

# PCA9554 GPIO extender for display reset
pca9554:
  - id: p_c_a
    address: 0x20
    i2c_id: bus_a    

switch:
  - platform: gpio
    pin: 38
    id: output_pin
    name: "Pin 38 Output"

  - platform: gpio
    name: "GT911 Reset"
    pin:
      pca9554: p_c_a
      number: 0
      mode:
        output: true
      inverted: false
    id: gt911_reset

  - platform: gpio
    name: "GT911 INT"
    pin:
      pca9554: p_c_a
      number: 1
      mode:
        output: true
      inverted: false
    id: gt911_int

script:
  - id: init_touch
    mode: queued
    then:
      - switch.turn_off: gt911_reset
      - switch.turn_off: gt911_int
      - delay: 20ms
      - switch.turn_on: gt911_reset
      - delay: 100ms
      - switch.turn_off: gt911_int

touchscreen:
  - platform: gt911
    id: my_touchscreen
    i2c_id: bus_a
    transform:
      mirror_x: false
      mirror_y: false
    update_interval: 50ms
    address: 0x5D

# -------------------------------------------
# Display
# -------------------------------------------
display:
  - platform: rpi_dpi_rgb
    id: my_display
    data_pins:
      red:
        - 14
        - 21
        - 47
        - 48
        - 45
      green:
        - 9
        - 46
        - 3
        - 8
        - 16
        - 1
      blue:
        - 15
        - 7
        - 6
        - 5
        - 4
    de_pin: GPIO41
    hsync_pin: 39
    vsync_pin: 40
    pclk_pin: 0
    hsync_front_porch: 40
    hsync_pulse_width: 48
    hsync_back_porch: 13
    vsync_front_porch: 1
    vsync_pulse_width: 31
    vsync_back_porch: 13
    pclk_inverted: true
    color_order: RGB
    auto_clear_enabled: false
    dimensions:
      width: 800
      height: 480

# Special LVGL settings required for this display
lvgl:
  rotation: ${rotation | default("0")}
