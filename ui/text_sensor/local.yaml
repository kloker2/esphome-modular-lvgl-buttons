---
# Local text sensor tile — displays a live string value from an ESPHome text sensor.
# Read-only: no action, no detail page.
#
# vars:
#   uid:          unique identifier
#   entity_id:    ESPHome text sensor component ID
#   row:          grid row
#   column:       grid column
#   text:         sensor name shown on tile
#   icon:         icon glyph
#   row_span:     (default: 1)
#   column_span:  (default: 1)
#   page_id:      parent page (default: main_page)

globals:
- id: ${uid}_current_value
  type: std::string
  initial_value: '""'

lvgl:
  pages:
  - id: !extend ${page_id | default("main_page")}
    widgets:
    - container:
        id: ${uid}_tile
        grid_cell_row_pos: ${row}
        grid_cell_column_pos: ${column}
        grid_cell_row_span: ${row_span | default(1)}
        grid_cell_column_span: ${column_span | default(1)}
        grid_cell_x_align: stretch
        grid_cell_y_align: stretch
        widgets:
        - button:
            id: button_${uid}
            clickable: false
            widgets:
            - label:
                id: icon_${uid}
                text_font: $icon_font
                align: top_left
                text: ${icon}
            - label:
                id: label_${uid}
                align: bottom_left
                long_mode: wrap
                width: 70%
                text: ${text}
            - label:
                id: value_${uid}
                align: top_right
                text_font: $text_font
                text_color: $label_on_color
                long_mode: dot
                width: 60%
                text: "--"

# ── Hook into the text sensor value changes ───────────────────────────────────
text_sensor:
- id: !extend ${entity_id}
  on_value:
  - lambda: id(${uid}_current_value) = x;
  - script.execute: ${uid}_sync_state

script:
- id: ${uid}_sync_state
  then:
  - lvgl.label.update:
      id: value_${uid}
      text: !lambda return id(${uid}_current_value);
