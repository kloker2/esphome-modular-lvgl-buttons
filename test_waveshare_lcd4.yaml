---
# Test config — Waveshare ESP32-S3 Touch LCD 4 (480×480)
# Tests all currently implemented ui/ component types
# Flash with: esphome run test_waveshare_lcd4.yaml

substitutions:
  icon_font: mdi_icons_40
  text_font: nunito_20
  text_color: white
  bg_color: black
  button_on_color: "ep_orange"
  button_off_color: "very_dark_gray"
  icon_on_color: "yellow"
  icon_off_color: "gray"
  label_on_color: "white"
  label_off_color: "gray"
  button_text_color: "white"

  display_daytime_brightness: "100%"
  display_nighttime_brightness: "50%"
  display_night_hour: "0"
  display_night_minute: "0"
  display_backlight_timeout_always_enabled: "false"
  display_backlight_timeout_initial: "5"

  screen_height: "480"
  screen_width: "480"

esphome:
  name: "waveshare-lcd-4-test"
  friendly_name: "Waveshare LCD-4 Test"
  comment: "ui/ component test — 480x480"
  on_boot:
  - priority: 400
    then:
    - script.execute: update_loading_page

logger:

script:
- id: time_update
  then:
  - lambda: |-
      // No operation

packages:
  wifi: !include esphome-modular-lvgl-buttons/common/wifi.yaml
  ota_screen: !include esphome-modular-lvgl-buttons/common/ota.yaml
  colors: !include esphome-modular-lvgl-buttons/common/color.yaml
  fonts: !include esphome-modular-lvgl-buttons/common/fonts.yaml
  glyphs: !include esphome-modular-lvgl-buttons/common/mdi_glyph_substitutions.yaml
  sensors: !include esphome-modular-lvgl-buttons/sensors/sensors_base.yaml
  theme_style: !include esphome-modular-lvgl-buttons/common/theme_style.yaml
  backlight: !include esphome-modular-lvgl-buttons/common/backlight_time.yaml
  hardware: !include esphome-modular-lvgl-buttons/hardware/waveshare-esp32-s3-touch-lcd-4-v4.yaml
  loading_screen: !include esphome-modular-lvgl-buttons/pages/loading.yaml
  info_screen: !include esphome-modular-lvgl-buttons/pages/info.yaml

  # ── Row 0 — Lights ───────────────────────────────────────────────────────────

  desk_lamp_btn: !include
    file: esphome-modular-lvgl-buttons/ui/light/local.yaml
    vars:
      uid: desk_lamp
      entity_id: desk_lamp
      row: 0
      column: 0
      text: "Desk"
      icon: $mdi_lamp

  ceiling_light_btn: !include
    file: esphome-modular-lvgl-buttons/ui/light/remote.yaml
    vars:
      uid: ceiling_light
      entity_id: "light.ceiling_light"
      row: 0
      column: 1
      text: "Ceiling"
      icon: $mdi_ceiling_light

  # ── Row 0-1 — Switches ───────────────────────────────────────────────────────

  test_fan_btn: !include
    file: esphome-modular-lvgl-buttons/ui/switch/local.yaml
    vars:
      uid: test_fan
      entity_id: test_fan
      row: 0
      column: 2
      text: "Fan"
      icon: $mdi_fan

  garden_pump_btn: !include
    file: esphome-modular-lvgl-buttons/ui/switch/remote.yaml
    vars:
      uid: garden_pump
      entity_id: "input_boolean.asd"
      row: 1
      column: 0
      text: "Pump"
      icon: $mdi_water_pump

  # ── Row 1 — Sensors ──────────────────────────────────────────────────────────

  room_temp_btn: !include
    file: esphome-modular-lvgl-buttons/ui/sensor/local.yaml
    vars:
      uid: room_temp
      entity_id: test_temperature
      row: 1
      column: 1
      text: "Room"
      icon: $mdi_thermometer
      unit: "°C"
      precision: 1

  outdoor_temp_btn: !include
    file: esphome-modular-lvgl-buttons/ui/sensor/remote.yaml
    vars:
      uid: outdoor_temp
      entity_id: "sensor.wled_bed_max_current"
      row: 1
      column: 2
      text: "Outdoor"
      icon: $mdi_thermometer
      unit: "°C"
      precision: 1

  # ── Row 2 — Climate ──────────────────────────────────────────────────────────

  home_ac_btn: !include
    file: esphome-modular-lvgl-buttons/ui/climate/remote.yaml
    vars:
      uid: home_ac
      entity_id: "climate.home_ac_d1_home_ac"
      row: 2
      column: 0
      text: "AC"
      icon: $mdi_thermostat

  local_thermo_btn: !include
    file: esphome-modular-lvgl-buttons/ui/climate/local.yaml
    vars:
      uid: local_thermo
      entity_id: local_thermostat
      row: 2
      column: 1
      text: "Thermostat"
      icon: $mdi_thermostat

lvgl:
  buffer_size: 100%
  pages:
  - id: main_page
    layout: 3x3
    styles: page_style
    <<: !include esphome-modular-lvgl-buttons/widgets/swipe_navigation.yaml

# ── Local hardware (template — no real GPIO needed) ───────────────────────────

output:
- platform: template
  id: desk_lamp_output
  type: float
  write_action:
  - lambda: return;

light:
- platform: monochromatic
  id: desk_lamp
  name: "Desk Lamp"
  output: desk_lamp_output
  restore_mode: RESTORE_DEFAULT_OFF

switch:
- platform: template
  id: test_fan
  name: "Test Fan"
  optimistic: true
  restore_mode: RESTORE_DEFAULT_OFF

- platform: template
  id: heater_relay
  name: "Heater"
  optimistic: true
  restore_mode: RESTORE_DEFAULT_OFF

- platform: template
  id: cooler_relay
  name: "Cooler"
  optimistic: true
  restore_mode: RESTORE_DEFAULT_OFF

climate:
- platform: thermostat
  id: local_thermostat
  name: "Local Thermostat"
  sensor: test_temperature
  min_heating_off_time: 0s
  min_heating_run_time: 0s
  min_cooling_off_time: 0s
  min_cooling_run_time: 0s
  min_idle_time: 0s
  heat_action:
  - switch.turn_on: heater_relay
  - switch.turn_off: cooler_relay
  cool_action:
  - switch.turn_on: cooler_relay
  - switch.turn_off: heater_relay
  idle_action:
  - switch.turn_off: heater_relay
  - switch.turn_off: cooler_relay
  default_preset: Home
  preset:
  - name: Home
    default_target_temperature_low: 20.0
    default_target_temperature_high: 24.0
  visual:
    min_temperature: 18
    max_temperature: 25
    temperature_step:
      target_temperature: 0.5
      current_temperature: 0.1

sensor:
- platform: template
  id: test_temperature
  name: "Test Temperature"
  unit_of_measurement: "°C"
  update_interval: 5s
  lambda: |-
    return 21.0f + (millis() % 1000) / 100.0f;

font:
- file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
  id: mdi_icons_40
  size: 40
  bpp: 8
  glyphs:
  # light detail page (required)
  - $mdi_brightness_6
  - $mdi_chevron_up
  - $mdi_circle_opacity
  - $mdi_eyedropper
  - $mdi_lightbulb
  # climate detail page (required)
  - $mdi_arrow_oscillating
  - $mdi_chevron_left
  - $mdi_thermostat
  - $mdi_water_percent
  # tile icons
  - $mdi_ceiling_light
  - $mdi_fan
  - $mdi_information_box
  - $mdi_lamp
  - $mdi_thermometer
  - $mdi_water_pump
